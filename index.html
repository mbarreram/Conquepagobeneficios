
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ConQuePago MultiBanco</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
button{padding:10px 16px;border:none;border-radius:8px;background:#111;color:#fff}
</style>
</head>
<body>
<h1>ConQuePago MultiBanco</h1>
<button onclick="load()">Cargar beneficios</button>
<div id="results"></div>

<script>
async function load(){
 const res = await fetch('/.netlify/functions/beneficios');
 const data = await res.json();
 document.getElementById('results').innerHTML =
   data.items.map(i => `
     <div class="card">
       <h3>${i.banco}</h3>
       <p>${i.fuente}</p>
       <small>${i.estado}</small>
     </div>
   `).join('');
}
</script>
</body>
</html>
